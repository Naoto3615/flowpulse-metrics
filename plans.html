<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowPulse | Plans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="extra-page">
    <div class="bg-layer"></div>
    <header class="site-header container">
      <a class="brand" href="index.html">FlowPulse</a>
      <button class="menu-toggle" aria-expanded="false" aria-label="メニュー">☰</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="plans.html">Plans</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </header>

    <main class="container">
      <section class="subhero reveal">
        <span class="eyebrow">PLANS</span>
        <h1>成長フェーズ別の分析プラン</h1>
        <p>導入規模に合わせて、ダッシュボードと自動化範囲を選択できます。</p>
      </section>

      <section class="section reveal" data-pricing>
        <div class="pricing-head">
          <h2>プラン一覧</h2>
          <div class="pricing-mode">
            <button class="mode-btn active" type="button" data-mode="monthly">Monthly</button>
            <button class="mode-btn" type="button" data-mode="yearly">Yearly</button>
          </div>
        </div>

        <div class="pricing-cards">
          <article class="price-card">
            <h3>Starter</h3>
            <p>KPIボードと週次レポート自動化。</p>
            <strong>¥<span data-price data-monthly="49000" data-yearly="540000">49000</span></strong>
          </article>
          <article class="price-card">
            <h3>Growth</h3>
            <p>コホート分析・アラート通知・権限制御。</p>
            <strong>¥<span data-price data-monthly="98000" data-yearly="1080000">98000</span></strong>
          </article>
          <article class="price-card">
            <h3>Enterprise</h3>
            <p>複数事業部統合とカスタム連携対応。</p>
            <strong>¥<span data-price data-monthly="180000" data-yearly="1980000">180000</span></strong>
          </article>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-head">
          <span class="eyebrow">ESTIMATE</span>
          <h2>簡易見積もり</h2>
        </div>
        <div class="calc-box">
          <form class="calc-form">
            <label>
              プラン単価(円)
              <select name="unit_price">
                <option value="49000">Starter</option>
                <option value="98000">Growth</option>
                <option value="180000">Enterprise</option>
              </select>
            </label>
            <label>
              数量
              <input type="number" name="quantity" min="1" value="1" />
            </label>
            <label>
              期間(月)
              <input type="number" name="months" min="1" value="3" />
            </label>
            <button type="submit" class="btn primary">見積もる</button>
          </form>
          <p class="calc-result" aria-live="polite">見積もり結果: -</p>
        </div>
      </section>
    </main>

    <footer class="container">© <span id="year"></span> FlowPulse</footer>
    <div class="toast" id="toast">更新内容を反映しました。</div>
    <script src="app.js"></script>
  </body>
</html>
